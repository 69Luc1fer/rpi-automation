name: RPi-Automation-CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push for RPi
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/arm64,linux/arm/v7
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rpi-app:latest

      - name: Test Published Image (ARM64)
        run: |
          docker run --rm --platform linux/arm64 ${{ secrets.DOCKER_USERNAME }}/rpi-app:latest

      - name: Test Published Image (ARM32/v7)
        run: |
          docker run --rm --platform linux/arm/v7 ${{ secrets.DOCKER_USERNAME }}/rpi-app:latest
